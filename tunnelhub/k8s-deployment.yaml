apiVersion: apps/v1
kind: Deployment
metadata:
  name: phonetalk-tunnelhub
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: phonetalk-tunnelhub
  template:
    metadata:
      labels:
        app: phonetalk-tunnelhub
    spec:
      containers:
        - name: tunnelhub
          image: adas-img.nioint.com/aa-perception/tunnelhub:v0.0.2
          ports:
            - containerPort: 7374
          env:
            - name: PORT
              value: "7374"
            - name: USERS
              valueFrom:
                secretKeyRef:
                  name: phonetalk-tunnelhub-secret
                  key: users
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          startupProbe:
            httpGet:
              path: /health
              port: 7374
            periodSeconds: 2
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 7374
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 7374
            periodSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: phonetalk-tunnelhub-svc
  namespace: default
spec:
  selector:
    app: phonetalk-tunnelhub
  ports:
    - port: 7374
      targetPort: 7374
  type: ClusterIP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
